<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <main>
        <div class="main-container">
            <h1 class="headerText">Register form</h1>

            <div class="form-container">
                <form action="">

                    <!--INPUT CONTAINER-->
                    <div class="input-container" id="firstName-container">
                        <label for="firstName" class="section-text">ชื่อจริง</label>
                        <input type="text" name="firstName" id="firstName" class="input" placeholder="กรอกชื่อจริง">
                    </div>

                    <div class="input-container" id="lastName-container">
                        <label for="lastName" class="section-text">นามสกุล</label>
                        <input type="text" name="lastName" id="lastName" class="input" placeholder="กรอกนามสกุล">
                    </div>

                    <div class="input-container">
                        <label for="age">อายุ</label>
                        <input type="number" id="age" name="age">
                    </div>

                    <!--GENDER CONTAINER-->
                    <div class="checkboxContainer genderContainer">
                        <div class="section-text">เพศ</div>

                        <div class="list-container">
                                <input name="gender" type="radio" value="ชาย"> ชาย <br>
                                <input name="gender" type="radio" value="หญิง"> หญิง <br>
                                <input name="gender" type="radio" value="ไม่ระบุ"> ไม่ระบุ                      
                        </div>
                    </div>

                    <!--INTEREST CONTAINER-->
                    <div class="checkboxContainer interestContainer">
                        <div class="section-text">สิ่งที่สนใจ</div>

                        <div class="list-container">
                                <input name="interest" type="checkbox" value="หนังสือ"> หนังสือ <br>
                                <input name="interest" type="checkbox" value="วิดีโอเกม"> วิดีโอเกม <br>
                                <input name="interest" type="checkbox" value="การเมือง"> การเมือง <br>
                        </div>   
                    </div>

                    <!--BUTTON CONTAINER-->
                    <div class="button-container">
                        <button onclick="submitData()">ส่งข้อมูล</button>
                    </div>


                </form>
            </div>


        </div>
    </main>


    <script src="script.js"></script>
</body>
</html>
